[tools]
python = "3.13"
uv = "latest"

[tasks.install]
description = "Install all workspace dependencies"
run = "uv sync"

[tasks.check]
description = "Run lint + type check + tests"
run = [
    "uv run ruff check .",
    "uv run mypy packages",
    "uv run pytest",
]

[tasks.test]
description = "Run tests only"
run = "uv run pytest"

[tasks.lint]
description = "Run ruff"
run = "uv run ruff check ."

[tasks.format]
description = "Format with ruff"
run = "uv run ruff format ."
