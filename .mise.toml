[tools]
python = "3.13"
uv = "0.11"

[tasks.install]
description = "Install all workspace dependencies"
run = "uv sync --all-packages"

[tasks.check]
description = "Run lint + type check + tests"
run = "uv run ruff check . && uv run mypy core/src && uv run pytest"

[tasks.test]
description = "Run tests only"
run = "uv run pytest"

[tasks.lint]
description = "Run ruff"
run = "uv run ruff check ."

[tasks.format]
description = "Format with ruff"
run = "uv run ruff format ."

[tasks.test-cov]
description = "Run tests with coverage report"
run = "uv run pytest --cov=yapilet --cov-report=term-missing"

[tasks."cli:single"]
description = "CLI smoke test — single request with mock-echo"
run = "uv run yapilet single configs/singles/echo.yaml --user-input hello --mock-echo"

[tasks."cli:action"]
description = "CLI smoke test — action chain with mock-echo"
run = "uv run yapilet action configs/actions/echo_chain.yaml --user-input hello --mock-echo"

[tasks."cli:chat"]
description = "CLI smoke test — interactive chat with mock-echo (single turn)"
run = "printf 'hello\\nexit\\n' | uv run yapilet chat configs/singles/echo_chat.yaml --mock-echo"

[tasks.build]
description = "Build wheels for yapilet-core and yapilet-cli"
run = "uv build --package yapilet-core && uv build --package yapilet-cli"
